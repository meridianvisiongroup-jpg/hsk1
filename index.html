<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSK 1 · Trazos · Pinyin · Español</title>
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.7/dist/hanzi-writer.min.js"></script>
<style>
  :root{
    --bg:#0f1115; --card:#1a1d24; --card2:#21252e; --ink:#f2f3f5;
    --muted:#9aa3b2; --accent:#C41E3A; --accent2:#e8b04b; --ok:#2ea66b;
    --line:#2c313c;
  }
  *{box-sizing:border-box}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%, #1b2030 0%, var(--bg) 60%);
    color:var(--ink); min-height:100vh; display:flex; flex-direction:column; align-items:center;
    padding:24px 16px 48px;
  }
  h1{font-size:20px; font-weight:700; letter-spacing:.5px; margin:0 0 2px}
  .sub{color:var(--muted); font-size:13px; margin-bottom:18px}
  .bar{
    width:100%; max-width:520px; display:flex; gap:10px; align-items:center;
    margin-bottom:14px; font-size:13px; color:var(--muted);
  }
  .progress{flex:1; height:8px; background:var(--card2); border-radius:99px; overflow:hidden}
  .progress > i{display:block; height:100%; width:0; background:linear-gradient(90deg,var(--accent),var(--accent2)); transition:width .3s}
  .card{
    width:100%; max-width:520px; background:var(--card); border:1px solid var(--line);
    border-radius:20px; padding:24px; box-shadow:0 20px 50px rgba(0,0,0,.45);
  }
  .hanzi-row{display:flex; gap:14px; justify-content:center; flex-wrap:wrap; margin:6px 0 16px}
  .hz{
    width:130px; height:130px; background:var(--card2); border-radius:16px;
    position:relative; border:1px solid var(--line);
  }
  /* cuadrícula米 */
  .hz::before,.hz::after{content:""; position:absolute; background:repeating-linear-gradient(transparent,transparent 4px,#3a4150 4px,#3a4150 8px)}
  .hz::before{left:50%; top:6%; width:1px; height:88%; transform:translateX(-.5px)}
  .hz::after{top:50%; left:6%; height:1px; width:88%; transform:translateY(-.5px)}
  .speed{display:flex; gap:6px; justify-content:center; align-items:center; margin-bottom:10px; flex-wrap:wrap; font-size:13px; color:var(--muted)}
  .speed button{padding:7px 12px; font-size:13px; border-radius:99px}
  .speed button.active{background:var(--accent); border-color:var(--accent); color:#fff}
  .controls{display:flex; gap:8px; justify-content:center; margin-bottom:6px; flex-wrap:wrap}
  button{
    font:inherit; cursor:pointer; border:none; border-radius:12px; padding:11px 16px;
    background:var(--card2); color:var(--ink); border:1px solid var(--line); transition:.15s;
    font-size:14px;
  }
  button:hover{transform:translateY(-1px); border-color:#3c424f}
  button:active{transform:translateY(0)}
  .ghost{background:transparent}
  .reveal{
    margin-top:18px; text-align:center; opacity:0; max-height:0; overflow:hidden; transition:.25s;
  }
  .reveal.show{opacity:1; max-height:560px; margin-top:18px}
  .pinyin{font-size:28px; color:var(--accent2); font-weight:600; letter-spacing:.5px}
  .meaning{font-size:22px; margin-top:6px}
  .pos{color:var(--muted); font-size:13px; margin-top:4px}
  .answer{
    display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:20px;
  }
  .btn-big{padding:15px; font-size:15px; font-weight:600}
  .btn-show{width:100%; padding:15px; font-size:16px; font-weight:600; background:var(--accent); border-color:var(--accent); margin-top:6px}
  .btn-show:hover{background:#d63350}
  .btn-ok{background:rgba(46,166,107,.15); border-color:var(--ok); color:#7fe0ac}
  .btn-rep{background:rgba(232,176,75,.12); border-color:var(--accent2); color:var(--accent2)}
  .footer{margin-top:16px; max-width:520px; width:100%; display:flex; justify-content:space-between; gap:10px}
  .footer button{flex:1; font-size:13px; padding:9px}
  .done{text-align:center; padding:40px 10px}
  .done .big{font-size:46px; margin-bottom:10px}
  .toggle{display:flex; gap:6px; align-items:center; font-size:12px; color:var(--muted)}
  .pill{background:var(--card2); border:1px solid var(--line); border-radius:99px; padding:4px 10px; font-size:12px}
  .example{margin-top:16px; padding:12px 14px; background:var(--card2); border:1px solid var(--line); border-radius:12px; cursor:pointer; text-align:left}
  .example:hover{border-color:#3c424f}
  .ex-label{font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; display:flex; justify-content:space-between; align-items:center}
  .ex-play{font-size:12px; padding:5px 10px; border-radius:99px; background:var(--accent); border-color:var(--accent); color:#fff; text-transform:none; letter-spacing:0}
  .ex-play:hover{background:#d63350}
  .ex-zh{font-size:19px; color:var(--ink); line-height:1.5}
  .ex-pin{font-size:14px; color:var(--accent2); margin-top:3px}
  .ex-es{font-size:14px; color:var(--muted); margin-top:3px}
  .stack{width:100%; display:flex; flex-direction:column; align-items:center}
  .hidden{display:none !important}
  .home{width:100%; max-width:520px}
  .levels{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px; justify-content:center}
  .lvl{padding:9px 14px; border-radius:12px; font-weight:600}
  .lvl.active{background:var(--accent); border-color:var(--accent); color:#fff}
  .lvl:disabled{opacity:.4; cursor:not-allowed}
  .units{display:grid; grid-template-columns:1fr 1fr; gap:10px}
  .unit{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px; cursor:pointer; transition:.15s}
  .unit:hover{border-color:#3c424f; transform:translateY(-1px)}
  .unit .u-title{font-weight:600; font-size:15px}
  .unit .u-sample{color:var(--muted); font-size:13px; margin-top:4px; line-height:1.5; word-break:break-word}
  .unit .u-prog{color:var(--accent2); font-size:12px; margin-top:8px}
  .unit.mix{grid-column:1 / -1; background:linear-gradient(90deg,rgba(196,30,58,.14),rgba(232,176,75,.08))}
  .u-bar{height:5px; background:var(--card2); border-radius:99px; overflow:hidden; margin-top:6px}
  .u-bar > i{display:block; height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2))}
</style>
</head>
<body>
  <h1>汉语 HSK · Trazos · Pinyin · Audio</h1>
  <div class="sub" id="sub">Elige un nivel y una unidad</div>

  <div class="home" id="home">
    <div class="levels" id="levels"></div>
    <div class="units" id="units"></div>
    <div style="text-align:center;margin-top:16px">
      <button class="ghost" id="btnResetLevel" style="font-size:12px;padding:8px 12px">⟲ Reiniciar avance de este nivel</button>
    </div>
  </div>

  <div class="stack hidden" id="exercise">
  <div class="bar">
    <span class="pill" id="counter">0 / 0</span>
    <div class="progress"><i id="progFill"></i></div>
    <span class="pill" id="leftCount">restan 0</span>
  </div>

  <div class="card" id="card">
    <div class="hanzi-row" id="hanziRow"></div>
    <div class="speed" id="speedSel">
      <span>Velocidad:</span>
      <button data-s="0.4">🐢 Lento</button>
      <button data-s="1">▶ Normal</button>
      <button data-s="2.5">⚡ Rápido</button>
    </div>
    <div class="controls">
      <button class="ghost" id="btnAnim">▶ Animar trazos</button>
      <button class="ghost" id="btnSpeak">🔊 Escuchar</button>
      <button class="ghost" id="btnOutline">擦 Mostrar/ocultar</button>
      <button class="ghost" id="btnQuiz">✍ Practicar (trazar)</button>
    </div>
    <button class="btn-show" id="btnShow">👁 Mostrar significado</button>

    <div class="reveal" id="reveal">
      <div class="pinyin" id="pinyin"></div>
      <div class="meaning" id="meaning"></div>
      <div class="pos" id="pos"></div>
      <div class="example" id="example" title="Toca para escuchar la frase">
        <div class="ex-label"><span>Ejemplo</span><button type="button" class="ex-play" id="exPlay">🔊 Escuchar frase</button></div>
        <div class="ex-zh" id="exZh"></div>
        <div class="ex-pin" id="exPin"></div>
        <div class="ex-es" id="exEs"></div>
      </div>
      <div class="answer">
        <button class="btn-big btn-ok" id="btnOk">✓ Acerté · siguiente</button>
        <button class="btn-big btn-rep" id="btnRep">↻ Repetir más tarde</button>
      </div>
    </div>
  </div>

  <div class="footer">
    <button id="btnMenu">← Menú</button>
    <button id="btnShuffle">🔀 Mezclar</button>
    <button id="btnSkip">⏭ Saltar</button>
  </div>
  </div>

const $ = id => document.getElementById(id);
const shuffle = a => { for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; };

// --- Niveles y unidades ---
const LEVELS = [
  {id:"hsk1", name:"HSK 1", words:WORDS, examples:EXAMPLES, ready:true},
  {id:"hsk2", name:"HSK 2", ready:false},
  {id:"hsk3", name:"HSK 3", ready:false},
  {id:"hsk4", name:"HSK 4", ready:false},
  {id:"hsk5", name:"HSK 5", ready:false},
  {id:"hsk6", name:"HSK 6", ready:false}
];
const UNIT_SIZE = 15;
function unitsOf(level){
  const arr = [];
  for(let s=0; s<level.words.length; s+=UNIT_SIZE){
    const end = Math.min(s+UNIT_SIZE, level.words.length);
    arr.push({ num: arr.length+1, idxs: Array.from({length:end-s},(_,k)=>s+k) });
  }
  return arr;
}

// --- Avance persistente por nivel ---
const LS_KEY = "hsk1_progress_v2";
let progress = {};
try{ const v = JSON.parse(localStorage.getItem(LS_KEY)); if(v && typeof v==="object") progress = v; }catch(e){}
if(!progress.hsk1){ try{ const v1 = JSON.parse(localStorage.getItem("hsk1_progress_v1")); if(v1 && Array.isArray(v1.learned)) progress.hsk1 = v1.learned; }catch(e){} }

// --- Estado ---
let curLevel = LEVELS[0];
let learned = new Set(progress[curLevel.id] || []);
let pool = [], poolLabel = "";
let deck = [], idx = 0, writers = [], revealed = false, shown = false, speed = 1;

function saveProgress(){ progress[curLevel.id] = [...learned]; try{ localStorage.setItem(LS_KEY, JSON.stringify(progress)); }catch(e){} }

// --- Voz (TTS) ---
let zhVoice = null;
function pickVoice(){
  const vs = speechSynthesis.getVoices();
  zhVoice = vs.find(v=>/zh[-_]CN/i.test(v.lang)) || vs.find(v=>/^zh/i.test(v.lang)) || null;
}
if("speechSynthesis" in window){ pickVoice(); speechSynthesis.onvoiceschanged = pickVoice; }
function speak(text){
  if(!("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "zh-CN";
  if(zhVoice) u.voice = zhVoice;
  u.rate = Math.min(1.3, Math.max(0.5, speed));
  speechSynthesis.speak(u);
}
const CARD_TPL = document.getElementById("card").innerHTML;

// --- Pantalla de inicio (selección de nivel y unidad) ---
function progBar(done,total){
  return '<div class="u-prog">'+done+' / '+total+' aprendidas</div><div class="u-bar"><i style="width:'+(total?done/total*100:0)+'%"></i></div>';
}
function showHome(){
  $("exercise").classList.add("hidden");
  $("home").classList.remove("hidden");
  $("sub").textContent = "Elige un nivel y una unidad";
  renderHome();
}
function renderHome(){
  const lv = $("levels"); lv.innerHTML = "";
  LEVELS.forEach(L=>{
    const b = document.createElement("button");
    b.className = "lvl" + (L===curLevel ? " active" : "");
    b.textContent = L.ready ? L.name : L.name+" 🔒";
    b.disabled = !L.ready;
    b.title = L.ready ? "" : "Próximamente";
    if(L.ready) b.onclick = ()=>{ curLevel = L; learned = new Set(progress[L.id]||[]); renderHome(); };
    lv.appendChild(b);
  });
  const cont = $("units"); cont.innerHTML = "";
  const words = curLevel.words;
  if(!curLevel.ready || !words){
    cont.innerHTML = '<div class="unit" style="grid-column:1/-1;text-align:center;cursor:default"><div class="u-title">Próximamente</div><div class="u-sample">Este nivel se habilitará con su vocabulario.</div></div>';
    return;
  }
  const all = words.map((_,i)=>i);
  const mix = document.createElement("div");
  mix.className = "unit mix";
  mix.innerHTML = '<div class="u-title">🔀 Mezcladas · todo el nivel</div><div class="u-sample">Ejercicios con las '+all.length+' palabras en orden aleatorio.</div>'+progBar(all.filter(i=>learned.has(i)).length, all.length);
  mix.onclick = ()=> startSession(all.slice(), "Mezcladas · "+curLevel.name);
  cont.appendChild(mix);
  unitsOf(curLevel).forEach(U=>{
    const done = U.idxs.filter(i=>learned.has(i)).length;
    const sample = U.idxs.slice(0,5).map(i=>words[i][0]).join(" ");
    const d = document.createElement("div");
    d.className = "unit";
    d.innerHTML = '<div class="u-title">Unidad '+U.num+'</div><div class="u-sample">'+sample+' …</div>'+progBar(done, U.idxs.length);
    d.onclick = ()=> startSession(U.idxs.slice(), curLevel.name+" · Unidad "+U.num);
    cont.appendChild(d);
  });
}

// --- Sesión de ejercicios ---
function startSession(idxs, label){
  pool = idxs; poolLabel = label;
  buildDeck(true);
  $("home").classList.add("hidden");
  $("exercise").classList.remove("hidden");
  $("sub").textContent = label;
  render();
}
function buildDeck(mix){
  deck = pool.filter(i=>!learned.has(i));
  if(deck.length===0) deck = pool.slice(); // todo aprendido → repaso libre
  if(mix) shuffle(deck);
  idx = 0;
}
window.showHome = showHome;
window.repeatSession = ()=> startSession(pool.slice(), poolLabel);

function render(){
  revealed = false; shown = false;
  const words = curLevel.words, examples = curLevel.examples;

  if(idx >= deck.length){
    const done = pool.filter(i=>learned.has(i)).length;
    $("card").innerHTML = '<div class="done"><div class="big">🎉</div><div>¡Terminaste '+poolLabel+'!</div><div class="sub" style="margin-top:8px">Aprendidas: '+done+' / '+pool.length+'</div><br><button class="btn-show" onclick="repeatSession()">↻ Repasar de nuevo</button><br><button class="ghost" style="margin-top:10px" onclick="showHome()">← Volver al menú</button></div>';
    updateBar();
    return;
  }

  $("card").innerHTML = CARD_TPL;
  bindCard();

  const [hanzi,pin,mean,pos] = words[deck[idx]];
  buildHanzi(hanzi);
  $("pinyin").textContent = pin;
  $("meaning").textContent = mean;
  $("pos").textContent = pos;

  const ex = examples && examples[hanzi];
  if(ex){
    $("exZh").textContent = ex[0];
    $("exPin").textContent = ex[1];
    $("exEs").textContent = ex[2];
    $("example").style.display = "";
    $("example").onclick = ()=> speak(ex[0]);
    $("exPlay").onclick = (e)=>{ e.stopPropagation(); speak(ex[0]); };
  } else {
    $("example").style.display = "none";
  }

  animateAll();
  speak(hanzi);
  updateBar();
}

function buildHanzi(hanzi){
  shown = false;
  writers = [];
  const row = $("hanziRow");
  row.innerHTML = "";
  [...hanzi].forEach(ch=>{
    const div = document.createElement("div");
    div.className = "hz";
    row.appendChild(div);
    writers.push(HanziWriter.create(div, ch, {
      width:130, height:130, padding:8,
      showOutline:true, showCharacter:false,
      strokeAnimationSpeed:speed, delayBetweenStrokes:120/speed,
      strokeColor:"#f2f3f5", outlineColor:"#3a4150", radicalColor:"#e8b04b",
      drawingColor:"#C41E3A"
    }));
  });
}

async function animateAll(){
  for(const w of writers){
    await new Promise(res=>w.animateCharacter({onComplete:res}));
  }
}

function updateBar(){
  const done = pool.filter(i=>learned.has(i)).length;
  $("counter").textContent = done + " / " + pool.length + " aprendidas";
  $("leftCount").textContent = "cola: " + Math.max(deck.length-idx,0);
  $("progFill").style.width = (pool.length ? done/pool.length*100 : 0) + "%";
}

function bindCard(){
  document.querySelectorAll("#speedSel button").forEach(b=>{
    b.classList.toggle("active", parseFloat(b.dataset.s)===speed);
    b.onclick = ()=>{
      speed = parseFloat(b.dataset.s);
      document.querySelectorAll("#speedSel button").forEach(x=>x.classList.toggle("active", x===b));
      buildHanzi(curLevel.words[deck[idx]][0]);
      animateAll();
    };
  });
  $("btnAnim").onclick = animateAll;
  $("btnSpeak").onclick = ()=> speak(curLevel.words[deck[idx]][0]);
  $("btnOutline").onclick = ()=>{ shown=!shown; writers.forEach(w=> shown? w.showCharacter():w.hideCharacter()); };
  $("btnQuiz").onclick = ()=> writers.forEach(w=>{ w.hideCharacter(); w.quiz({showHintAfterMisses:2}); });
  $("btnShow").onclick = ()=>{
    revealed = !revealed;
    $("reveal").classList.toggle("show", revealed);
    $("btnShow").textContent = revealed ? "🙈 Ocultar significado" : "👁 Mostrar significado";
  };
  $("btnOk").onclick = ()=>{ learned.add(deck[idx]); saveProgress(); idx++; render(); };
  $("btnRep").onclick = ()=>{ const c=deck.splice(idx,1)[0]; deck.push(c); render(); };
}
$("btnMenu").onclick = showHome;
$("btnSkip").onclick = ()=>{ idx++; render(); };
$("btnShuffle").onclick = ()=>{ buildDeck(true); render(); };
$("btnResetLevel").onclick = ()=>{ if(confirm("¿Borrar el avance de "+curLevel.name+"?")){ learned.clear(); saveProgress(); renderHome(); } };

showHome();
</script>
